services:
  finsight-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finsight-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HF_HOME: /app/.cache/huggingface
    volumes:
      - ./data:/app/data
      - huggingface-cache:/app/.cache/huggingface
    command: uvicorn src.finsight.api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  huggingface-cache: